<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Maximus V2</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Styles will come in Module 2 -->
  <link rel="stylesheet" href="maximus-v2.css" />
</head>
<body>
  <div id="app">
    <header class="mv2-header">
      <div class="mv2-title">MAXIMUS V2</div>
      <div class="mv2-subtitle">Neon Long‑Form Audio Reactor</div>
    </header>

    <!-- Full-width Grok-style prompt bar -->
    <section class="mv2-prompt-bar">
      <input
        id="promptInput"
        type="text"
        placeholder="Describe the sound: e.g. dark synthwave with heavy bass..."
        autocomplete="off"
      />
    </section>

    <!-- Controls: numeric length + generate button -->
    <section class="mv2-controls">
      <div class="mv2-control-group">
        <label for="lengthInput">Length (seconds)</label>
        <input
          id="lengthInput"
          type="number"
          min="10"
          max="1200"
          value="180"
        />
      </div>
      <button id="generateBtn" class="mv2-generate-btn">
        GENERATE
      </button>
    </section>

    <!-- Progress + terminal log -->
    <section class="mv2-status">
      <div class="mv2-progress-bar">
        <div id="progressFill" class="mv2-progress-fill"></div>
      </div>
      <pre id="log" class="mv2-log"></pre>
    </section>

    <!-- Waveform oscilloscope -->
    <section class="mv2-waveform-panel">
      <canvas id="waveformCanvas"></canvas>
    </section>
  </div>

  <!-- Reactor + audio logic will come in JS modules -->
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
  <script src="maximus-v2.js"></script>
</body>
</html>
